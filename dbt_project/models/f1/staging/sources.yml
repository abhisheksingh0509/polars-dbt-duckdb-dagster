version: 2

# Sources point dbt at data that lives OUTSIDE dbt — here, the Delta tables that
# Polars+Dagster wrote into data/raw/f1/. Declaring them as sources gives dbt:
#   - Lineage tracking (you'll see f1/raw_races as a green node in `dbt docs`)
#   - The {{ source('f1', 'raw_races') }} reference syntax in staging models
#   - A single place to document raw-layer schemas
#
# The source GROUP name IS the dataset name ("f1"). LakehouseDbtTranslator
# (pipelines/stack/dbt.py) maps source('f1', 'raw_races') → AssetKey(["f1", "raw_races"]),
# which is exactly the key the Polars bronze asset uses — so the two resolve to one
# unified node in Dagster's graph. To add a dataset, add a source group named after it.

sources:
  - name: f1
    description: "Bronze layer (F1) — Delta tables written by Polars via Dagster"
    tables:
      # Pattern note: each Delta source needs its own delta_table_path. The dbt-duckdb
      # delta plugin doesn't auto-substitute the table name (unlike the `external`
      # materialization), so we spell out the full path explicitly.
      # The ".delta" suffix is appended by PolarsDeltaIOManager as a format marker.
      # The "/f1/" segment is the dataset namespace (asset key prefix → on-disk path).
      - name: raw_races
        description: "F1 races (calendar + circuit metadata). Source: datasets/f1/sources.py::raw_races."
        meta:
          plugin: delta
          delta_table_path: "{{ env_var('LAKEHOUSE_DATA_ROOT', '../data') }}/raw/f1/raw_races.delta"

      - name: raw_drivers
        description: "Drivers active this season. Source: datasets/f1/sources.py::raw_drivers."
        meta:
          plugin: delta
          delta_table_path: "{{ env_var('LAKEHOUSE_DATA_ROOT', '../data') }}/raw/f1/raw_drivers.delta"

      - name: raw_results
        description: "Race results — one row per (race, driver). Source: datasets/f1/sources.py::raw_results."
        meta:
          plugin: delta
          delta_table_path: "{{ env_var('LAKEHOUSE_DATA_ROOT', '../data') }}/raw/f1/raw_results.delta"
