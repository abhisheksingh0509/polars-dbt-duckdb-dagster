version: 2

# Sources point dbt at data that lives OUTSIDE dbt — here, the Delta tables that
# Polars+Dagster wrote into data/raw/. Declaring them as sources gives dbt:
#   - Lineage tracking (you'll see raw_races as a green node in `dbt docs`)
#   - The {{ source('raw', 'raw_races') }} reference syntax in staging models
#   - A single place to document raw-layer schemas

sources:
  - name: raw
    description: "Bronze layer — Delta tables written by Polars via Dagster"
    tables:
      # Pattern note: each Delta source needs its own delta_table_path. The dbt-duckdb
      # delta plugin doesn't auto-substitute the table name (unlike the `external`
      # materialization), so we spell out the full path explicitly.
      # The ".delta" suffix is appended by PolarsDeltaIOManager as a format marker.
      - name: raw_races
        description: "F1 races (calendar + circuit metadata). Pipeline: pipelines/assets/raw.py::raw_races."
        meta:
          plugin: delta
          delta_table_path: "{{ env_var('LAKEHOUSE_DATA_ROOT', '../data') }}/raw/raw_races.delta"

      - name: raw_drivers
        description: "Drivers active this season. Pipeline: pipelines/assets/raw.py::raw_drivers."
        meta:
          plugin: delta
          delta_table_path: "{{ env_var('LAKEHOUSE_DATA_ROOT', '../data') }}/raw/raw_drivers.delta"

      - name: raw_results
        description: "Race results — one row per (race, driver). Pipeline: pipelines/assets/raw.py::raw_results."
        meta:
          plugin: delta
          delta_table_path: "{{ env_var('LAKEHOUSE_DATA_ROOT', '../data') }}/raw/raw_results.delta"
