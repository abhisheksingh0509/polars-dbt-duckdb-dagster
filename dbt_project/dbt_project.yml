# dbt project metadata. dbt reads this from the working directory when you run
# `dbt run`, `dbt build`, etc.

name: 'f1_lakehouse'
version: '1.0.0'
config-version: 2

# Which profile in profiles.yml to use (selects database connection + plugins)
profile: 'f1_lakehouse'

# Default directory layout. dbt looks here for SQL, tests, seeds, etc.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Where dbt writes compiled SQL, run results, and the manifest. Gitignored.
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Default materialization config, applied to models by folder.
# Models are namespaced by dataset: models/<dataset>/staging/ and models/<dataset>/marts/.
# Each writes Parquet to data/staging/<dataset>/ and data/marts/<dataset>/ (the per-dataset
# `location` is set in each model's config() block — `{{ this.name }}` isn't available at
# parse time when set here at project level).
#
# To add a dataset, add a models/<dataset>/ block mirroring f1 below.
models:
  f1_lakehouse:
    f1:
      staging:
        +materialized: external
        +format: parquet
      marts:
        +materialized: external
        +format: parquet
